<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Link Examples</title>
    
    <!-- The <link> tag: Connects an external CSS file to style your page -->
    <link rel="stylesheet" href="style.css">
    
    <!-- The <link> tag: Adds an icon to the browser tab -->
    <link rel="icon" href="favicon.ico">
</head>
<body>

    <h1>HTML Implementation of Links</h1>

    <!-- 1. Standard Link: Opens in the same tab -->
    <p>Go to <a href="https://google.com">Google</a>.</p>

    <!-- 2. New Tab Link: Opens in a fresh tab -->
    <p>Visit <a href="https://wikipedia.org" target="_blank">Wikipedia</a> (opens in new tab).</p>

    <!-- 3. Email Link: Opens the user's mail app -->
    <p>Questions? <a href="mailto:hello@example.com">Email Us</a>.</p>

    <!-- 4. Section Link: Jumps further down the page -->
    <p>Skip to the <a href="#footer">Footer</a>.</p>

    <div style="margin-top: 1000px;"></div> <!-- Just adding space to demonstrate jumping -->

    <footer id="footer">
        <p>You reached the footer section!</p>
        <!-- Link to go back to the top -->
        <a href="#">Back to Top</a>
    </footer>

</body>
</html>
